<html lang="zh-CN"><head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <title>Openning</title>

    <link rel="stylesheet" href="./index.css">

</head>

<body>
    <label class="switch">
        <input id="checkbox" type="checkbox">

        <div class="button">
            <div class="light"></div>
